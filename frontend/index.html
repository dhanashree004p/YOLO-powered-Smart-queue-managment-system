<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Smart Queue Dashboard</title>

    <!-- Fixed CSS Path -->
    <link rel="stylesheet" href="styles.css"/>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="header">
      <h1>Smart Queue Monitoring</h1>
      <div style="display:flex;gap:16px;align-items:center;">
        <div id="recommendedQueue" class="badge" style="background:#10b981;display:none;">Recommended: None</div>
        <div id="alertBadge" class="badge">OK</div>
        <div class="notification-container">
          <button id="notificationBtn" class="notification-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span id="notificationBadge" class="notification-badge" style="display:none;">0</span>
          </button>

          <div id="notificationDropdown" class="notification-dropdown" style="display:none;">
            <div class="notification-header">Notifications</div>
            <div id="notificationList" class="notification-list">
              <div class="notification-empty">No new notifications</div>
            </div>
          </div>
        </div>

        <button id="logoutBtn" style="display:none;background:transparent;border:1px solid var(--muted);font-size:0.8rem;padding:4px 12px;">
          Logout
        </button>
      </div>
    </header>

    <!-- KEEP ALL YOUR EXISTING HTML HERE EXACTLY AS IT IS -->

    <footer class="footer">
      <div>
        Thresholds are configurable via /config endpoint.
      </div>
    </footer>

    <!-- Fixed JS Path -->
    <script src="script.js"></script>

</body>
</html>
